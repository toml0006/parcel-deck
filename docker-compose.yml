services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: package_tracker
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d package_tracker"]
      timeout: 5s
      interval: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:${APP_PORT:-3010}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/package_tracker?schema=public
      INGEST_SHARED_SECRET: replace-with-a-long-random-secret
      TRACKING_PROVIDER: carrier_link
      TRACKING_PROVIDER_API_KEY: ""
      WORKER_INTERVAL_MS: 300000
    ports:
      - "${APP_PORT:-3010}:3000"

  worker:
    build: .
    command: ["npm", "run", "worker"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:${APP_PORT:-3010}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/package_tracker?schema=public
      INGEST_SHARED_SECRET: replace-with-a-long-random-secret
      TRACKING_PROVIDER: carrier_link
      TRACKING_PROVIDER_API_KEY: ""
      WORKER_INTERVAL_MS: 300000

volumes:
  postgres-data:
